// ─── SHA-256 ──────────────────────────────────────────────────────
async function sha256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

// ─── UTILIDADES ───────────────────────────────────────────────────
function isClosed(m){
  return new Date()>=new Date(new Date(m.date).getTime()-30*60*1000);
}

function isPlayed(m){
  return new Date() >= new Date(
    new Date(m.date).getTime() + (60 * 60 * 1000)
  );
}

// Partido se mueve a "Jugados" 24 horas después de su inicio
function isMovedToPlayed(m){
  return new Date() >= new Date(
    new Date(m.date).getTime() + (24 * 60 * 60 * 1000)
  );
}

function fmtDate(d){
  const dt=new Date(d);
  const dias=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const h=dt.getHours().toString().padStart(2,'0');
  const mn=dt.getMinutes().toString().padStart(2,'0');
  return dias[dt.getDay()]+' '+dt.getDate()+' '+meses[dt.getMonth()]+' &middot; '+h+':'+mn+' (Col)';
}

function showToast(msg, isError){
  var t=document.createElement('div');
  t.className=isError?'toast-err':'toast';
  t.innerHTML=msg;
  var wrap=document.querySelector('.wrap');
  // insertar despues del header y tabs (posicion 2)
  var ref=wrap.children[2]||null;
  wrap.insertBefore(t,ref);
  setTimeout(function(){if(t.parentNode)t.remove();},3000);
}

// ─── GOOGLE SHEETS: GUARDAR ───────────────────────────────────────
function saveToSheets(entry){
  fetch(API_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(entry)
  }).catch(function(err){
    console.warn('Error enviando a Sheets:',err);
  });
}

// ─── GOOGLE SHEETS: CARGAR HISTORIAL ─────────────────────────────
function loadFromSheets(callback){
  var url=API_URL+'?action=get&t='+Date.now();
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(resp){
      if(resp && resp.data && resp.data.length>1){
        // fila 0 = encabezados, saltar
        history=resp.data.slice(1).map(function(row){
          return {
            match:     row[0]||'',
            homeTeam:  row[1]||'',
            scoreHome: row[2]||0,
            scoreAway: row[3]||0,
            awayTeam:  row[4]||'',
            name:      row[5]||'',
            date:      row[6]||'',
            time:      row[7]||'',
            phase:     row[8]||'',
            venue:     row[9]||'',
            points:    row[10]||'',
            winner:    row[12]||''
          };
        }).filter(function(r){return r.match!=='';});
      } else {
        history=[];
      }
      if(callback) callback();
    })
    .catch(function(err){
      console.warn('No se pudo cargar historial de Sheets:',err);
      history=[];
      if(callback) callback();
    });
}

function renderGroups(){

  var h='';

  if(selMatch && currentTab==='grupo'){
    h += betPanel();

  h += '<div class="mlist">';

  partidos.forEach(function(m){
  if(!isPlayed(m)){
    h += card(m);
  }
});

  h += '</div>';

  document.getElementById('panel-grupo').innerHTML = h;
}


function renderPlayed(){

  var todos = GRP.concat(R32,R16,QF,SF,FIN);

  var jugados = todos
    .filter(function(m){
      return isMovedToPlayed(m);
    })
    .sort(function(a,b){
      return new Date(b.date) - new Date(a.date);
    });

  var h='';

  if(jugados.length===0){

    h='<div class="hempty">No hay partidos jugados todavía.</div>';

  }else{

    h+='<div class="mlist">';

    jugados.forEach(function(m){

      h+='<div class="mcard cls">'
        +'<div class="mrow">'
        +'<span class="fl">'+fl(m.home)+'</span>'
        +'<span class="tn">'+m.home+'</span>'
        +'<span class="vs">VS</span>'
        +'<span class="tn r">'+m.away+'</span>'

        +'</div>'

        +'<div class="mmeta">'
        +'<span class="mtime">'+fmtDate(m.date)+'</span>'

        +'<div class="badges">'

        +(m.group
          ? '<span class="gbadge">Grupo '+m.group+'</span>'
          : '<span class="gbadge">'+(m.phase||'')+'</span>')

        +'<span class="cbadge">Finalizado</span>'

        +'</div>'
        +'</div>'

        +'<div class="venue">'+m.venue+'</div>'
        +'</div>';

    });

    h+='</div>';
  }

  document.getElementById('panel-jugados').innerHTML=h;
}

function renderList(pid,arr){
  var h='';
  if(selMatch&&currentTab===pid) h+=betPanel();
  h+='<div class="mlist">';
  arr.forEach(function(m){
    if(!isMovedToPlayed(m)) h+=card(m);
  });
  h+='</div>';
  document.getElementById('panel-'+pid).innerHTML=h;
}

// ─── RENDER HISTORIAL (SOLO ADMIN) ───────────────────────────────
function renderHist(){
  var el=document.getElementById('panel-hist');
  if(!adminOK){
    el.innerHTML='<div class="hlocked">'
      +'<div class="hlocked-icon">&#128274;</div>'
      +'<p><strong>Seccion privada</strong><br>Solo el administrador puede ver el historial completo de apuestas.</p>'
      +'<div style="width:100%;max-width:340px">'
      +'<div class="prow">'
      +'<input type="password" id="pi" placeholder="Contrasena admin..." onkeydown="if(event.key===\'Enter\')tryLogin()"/>'
      +'<button class="bunlock" onclick="tryLogin()">&#128275; Entrar</button>'
      +'</div>'
      +'<div class="perr" id="pe"></div>'
      +'</div></div>';
    return;
  }

  var term='';
  var hs=document.getElementById('hs');
  if(hs) term=hs.value||'';

  var fil=history.filter(function(h){
    return h.name.toLowerCase().indexOf(term.toLowerCase())>=0
      || h.match.toLowerCase().indexOf(term.toLowerCase())>=0;
  });

  var personas=[...new Set(history.map(function(h){return h.name;}))].length;
  var partidos=[...new Set(history.map(function(h){return h.match;}))].length;

  var html='<div class="hhdr">'
    +'<h2>&#128737; Historial admin</h2>'
    +'<div class="hactions">'
    +'<button class="breload" onclick="reloadHist()">&#8635; Actualizar</button>'
    +'<button class="bxls" onclick="exportCSV()">&#128196; Exportar CSV</button>'
    +'<button class="blogout" onclick="logout()">&#128274; Salir</button>'
    +'</div></div>'
    +'<div class="stats">'
    +'<div class="sc"><div class="sl">Total apuestas</div><div class="sv">'+history.length+'</div></div>'
    +'<div class="sc"><div class="sl">Participantes</div><div class="sv">'+personas+'</div></div>'
    +'<div class="sc"><div class="sl">Partidos apostados</div><div class="sv">'+partidos+'</div></div>'
    +'</div>'
    +'<input type="text" class="sbox" id="hs" placeholder="Buscar por nombre o partido..." oninput="filterH(this.value)" value="'+term+'">';

  if(fil.length===0){
    html+='<p class="hempty">'+(term?'Sin resultados para "'+term+'"':'No hay apuestas registradas aun.')+'</p>';
  } else {
    fil.slice().reverse().forEach(function(h){
      html+='<div class="hi">'
        +'<div class="hihdr">'
        +'<span class="himatch">'+h.match+'</span>'
        +'<span class="hiscore">'+h.scoreHome+' &ndash; '+h.scoreAway+'</span>'
        +'</div>'
        +'<div class="himeta">'
        +'<span>&#128100; '+h.name+'</span>'
        +'<span>&#127942; '+(h.winner||'—')+'</span>'
        +'<span>&#128197; '+h.date+'</span>'
        +'<span>&#128336; '+h.time+'</span>'
        +'<span>&#127937; '+(h.phase||'')+'</span>'
        +'</div></div>';
    });
  }
  el.innerHTML=html;
}

function filterH(v){renderHist();var e=document.getElementById('hs');if(e)e.value=v;}

function reloadHist(){
  var el=document.getElementById('panel-hist');
  el.innerHTML='<p class="loading">&#8635; Cargando apuestas desde Google Sheets...</p>';
  loadFromSheets(function(){renderHist();});
}

// ─── LOGIN / LOGOUT ──────────────────────────────────────────────
function tryLogin(){
  var val=(document.getElementById('pi')||{value:''}).value;
  sha256(val).then(function(h){
    if(h===ADMIN_HASH){
      adminOK=true;
      // Al entrar, cargar historial fresco desde Sheets
      var el=document.getElementById('panel-hist');
      el.innerHTML='<p class="loading">&#8635; Cargando apuestas desde Google Sheets...</p>';
      loadFromSheets(function(){renderHist();});
    } else {
      var e=document.getElementById('pe');
      if(e){e.textContent='Contrasena incorrecta. Intenta de nuevo.';document.getElementById('pi').value='';}
    }
  });
}

function logout(){adminOK=false;history=[];renderHist();}

// ─── SELECCIONAR PARTIDO ─────────────────────────────────────────
function pick(id){
  var all = GRP.concat(R32,R16,QF,SF,FIN);
  var m = null;

  for(var i=0;i<all.length;i++){
    if(all[i].id===id){
      m=all[i];
      break;
    }
  }

  if(!m || isClosed(m)) return;

  selMatch = m;

  // Renderizar nuevamente
  refresh();

  // Esperar a que aparezca el panel
  setTimeout(function(){

    // Buscar el panel de apuesta
    var panel = document.querySelector('.bpanel');

    if(panel){
      panel.scrollIntoView({
        behavior: 'smooth',
        block: 'start'
      });
    }

  }, 100);
}

// ─── ENVIAR APUESTA ───────────────────────────────────────────────
function submitBet(){
  var name=(document.getElementById('bn')||{value:''}).value.trim();
  var winner=(document.getElementById('bw')||{value:''}).value.trim();
  var sh=parseInt((document.getElementById('sh')||{value:'0'}).value,10);
  var sa=parseInt((document.getElementById('sa')||{value:'0'}).value,10);
  if(!name){alert('Por favor selecciona tu nombre o alias.');return;}
  if(!winner){alert('Por favor selecciona el ganador del partido.');return;}

  var now=new Date();
  var all=GRP.concat(R32,R16,QF,SF,FIN);
  var m=null;
  for(var i=0;i<all.length;i++){if(all[i].id===selMatch.id){m=all[i];break;}}

  var entry={
    match:     selMatch.home+' vs '+selMatch.away,
    homeTeam:  selMatch.home,
    scoreHome: isNaN(sh)?0:sh,
    scoreAway: isNaN(sa)?0:sa,
    awayTeam:  selMatch.away,
    name:      name,
    date:      now.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'}),
    time:      now.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
    phase:     m?(m.phase||(m.group?'Grupos':'')):'',
    venue:     m?m.venue:'',
    points:    '',
    winner:    winner
  };

  // Enviar a Google Sheets
  fetch(API_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(entry)
  }).catch(function(err){console.warn('Sheets error:',err);});

  // Continuar inmediatamente sin esperar respuesta
  selMatch=null;
  showToast('&#10003; Apuesta registrada correctamente.',false);
  refresh();
}

// ─── EXPORTAR CSV ────────────────────────────────────────────────
function exportCSV(){
  if(history.length===0){alert('No hay apuestas para exportar.');return;}
  var rows=[['Partido','Equipo Local','Marcador Local','Marcador Visitante','Equipo Visitante','Participante','Fecha','Hora','Fase','Sede','Puntos','Ganador']];
  history.forEach(function(h){
    rows.push([h.match,h.homeTeam||'',h.scoreHome,h.scoreAway,h.awayTeam||'',h.name,h.date,h.time,h.phase||'',h.venue||'',h.points||'',h.winner||'']);
  });
  var csv=rows.map(function(r){
    return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');
  }).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='apuestas_mundial_2026.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ─── NAVEGACION ───────────────────────────────────────────────────
function showTab(t){
  currentTab=t;
  var tabs=['jugados','grupo','r32','r16','qf','sf','fin','hist'];
  var tabBtns=document.querySelectorAll('.tab');
  var panels=document.querySelectorAll('.panel');
  tabs.forEach(function(p,i){
    tabBtns[i].classList.toggle('active',p===t);
    panels[i].classList.toggle('active',p===t);
  });
  refresh();
}

function refresh(){

  if(currentTab==='jugados')
    renderPlayed();

  else if(currentTab==='grupo')
    renderGroups();

  else if(currentTab==='r32')
    renderList('r32',R32);

  else if(currentTab==='r16')
    renderList('r16',R16);

  else if(currentTab==='qf')
    renderList('qf',QF);

  else if(currentTab==='sf')
    renderList('sf',SF);

  else if(currentTab==='fin')
    renderList('fin',FIN);

  else
    renderHist();
}
// ─── INICIO ───────────────────────────────────────────────────────
renderGroups();
