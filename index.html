```html
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apuestas Mundial 2026</title>

<style>

body{
  font-family:Arial;
  background:#0b1220;
  color:white;
  margin:0;
  padding:20px;
}

.container{
  max-width:700px;
  margin:auto;
}

h1{
  text-align:center;
}

.partido{
  background:#1b2435;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

.equipos{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

input{
  width:60px;
  padding:8px;
  text-align:center;
  border-radius:8px;
  border:none;
  font-size:18px;
}

select{
  padding:10px;
  border-radius:8px;
  border:none;
  width:100%;
  margin-top:10px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

.ganador-container{
  margin-top:10px;
  text-align:center;
}

.ganador-select{
  width:100%;
}

</style>

</head>

<body>

<div class="container">

<h1>🏆 Apuestas Mundial 2026</h1>

<label>Participante</label>

<select id="nombre">

<option value="">Seleccione</option>

<option>Juan López</option>
<option>Rubén</option>
<option>Angelica</option>
<option>Liz</option>
<option>Tatiana Montiel</option>
<option>Johan</option>
<option>Fernanda</option>
<option>Wi</option>
<option>Juan</option>

</select>

<div id="partidos"></div>

<br>

<button onclick="enviar()">Enviar Apuestas</button>

</div>

<script>

const WEBAPP_URL =
"https://script.google.com/macros/s/TU_WEBAPP/exec";

const partidos = [

{
  partido:"Argentina vs Brasil",
  local:"Argentina",
  visitante:"Brasil"
},

{
  partido:"Colombia vs Francia",
  local:"Colombia",
  visitante:"Francia"
}

];

const contenedor =
document.getElementById("partidos");

partidos.forEach((p, i) => {

  contenedor.innerHTML += `

  <div class="partido">

    <h3>${p.partido}</h3>

    <div class="equipos">

      <span>${p.local}</span>

      <input
        type="number"
        min="0"
        id="gl_${i}"
      >

      <span>vs</span>

      <input
        type="number"
        min="0"
        id="gv_${i}"
      >

      <span>${p.visitante}</span>

    </div>

    <div class="ganador-container">

      <label>Ganador:</label>

      <select
        id="ganador_${i}"
        class="ganador-select"
      >

        <option value="${p.local}">
          ${p.local}
        </option>

        <option value="${p.visitante}">
          ${p.visitante}
        </option>

      </select>

    </div>

  </div>

  `;

});

async function enviar(){

  const nombre =
    document.getElementById("nombre").value;

  if(nombre == ""){

    alert("Seleccione participante");

    return;
  }

  const apuestas = [];

  partidos.forEach((p, i) => {

    apuestas.push({

      partido:p.partido,

      local:p.local,

      gl:
        document.getElementById(`gl_${i}`).value,

      gv:
        document.getElementById(`gv_${i}`).value,

      visitante:p.visitante,

      ganador:
        document.getElementById(`ganador_${i}`).value

    });

  });

  const datos = {

    nombre:nombre,

    apuestas:apuestas

  };

  try{

    await fetch(WEBAPP_URL,{

      method:"POST",

      body:JSON.stringify(datos)

    });

    alert("✅ Apuestas enviadas");

  }catch(error){

    alert("❌ Error enviando");
  }
}

</script>

</body>

</html>
```
